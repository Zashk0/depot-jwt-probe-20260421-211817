name: Probe on depot-ubuntu-22.04-4

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  probe:
    runs-on: depot-ubuntu-22.04-4
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
      - run: go test -v -run TestIntegrationHarness ./...
